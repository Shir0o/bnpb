plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace = "com.bnpb.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
        }
        release {
            keyAlias keyProperties['keyAlias']
            keyPassword keyProperties['keyPassword']
            storeFile keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword keyProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.bnpb.app"
        // Pinned to 24 because flutter_gemma's native MediaPipe LLM Inference
        // runtime requires minSdk 24. Drops Android 5/6 support.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    // flutter_gemma ships MediaPipe vision + image-generator native libs that
    // this app never uses (~38 MB). Drop them from every variant — they're
    // dead weight in both debug and release. Embedding, text-chunker, and
    // vector-store libs stay; they're needed by planned NL-search (#174).
    packaging {
        jniLibs {
            excludes += [
                'lib/*/libmediapipe_tasks_vision_jni.so',
                'lib/*/libmediapipe_tasks_vision_image_generator_jni.so',
                'lib/*/libimagegenerator_gpu.so',
            ]
        }
    }

    buildTypes {
        release {
            // Use production signing if keys are available, otherwise fall back to debug.
            if (keyProperties['storeFile'] != null && file(keyProperties['storeFile']).exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Restrict shipped APK to the ABIs end-users actually need.
            // Scoped to `release` so debug builds keep x86_64 for emulator dev.
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }

            // `ndk.abiFilters` does NOT reach AAR-bundled JNI libs in current
            // AGP (flutter_gemma's AAR ships x86_64 builds for every MediaPipe
            // library, ~60 MB). Explicit `packaging` excludes are the only
            // reliable lever. Also scoped to release so debug emulators work.
            packaging {
                jniLibs {
                    excludes += [
                        'lib/x86_64/**',
                        'lib/x86/**',
                    ]
                }
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
