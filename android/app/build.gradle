plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}

android {
    namespace = "com.bnpb.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
        }
        release {
            keyAlias keyProperties['keyAlias']
            keyPassword keyProperties['keyPassword']
            storeFile keyProperties['storeFile'] ? file(keyProperties['storeFile']) : null
            storePassword keyProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.bnpb.app"
        // Pinned to 24 because flutter_gemma's native MediaPipe LLM Inference
        // runtime requires minSdk 24. Drops Android 5/6 support.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Restrict packaged JNI libs to the ABIs we actually ship. flutter_gemma's
        // AAR bundles x86_64 builds of every MediaPipe library (~55 MB) that
        // would otherwise ride along even with `flutter build --target-platform`.
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    // flutter_gemma ships several MediaPipe native libs we don't use (image
    // generation + vision tasks). Excluding them saves ~38 MB. Embedding,
    // text chunker, and vector store libs stay — they're needed by planned
    // NL-search work (#174).
    //
    // Also explicitly drop x86_64 from the packaged APK. `ndk.abiFilters`
    // does NOT reach AAR-bundled libs in newer AGP — flutter_gemma ships
    // full x86_64 builds (~60 MB) that ride along otherwise. Emulator
    // users can use the debug/profile APK or a dedicated x86_64 variant.
    packagingOptions {
        jniLibs {
            excludes += [
                'lib/*/libmediapipe_tasks_vision_jni.so',
                'lib/*/libmediapipe_tasks_vision_image_generator_jni.so',
                'lib/*/libimagegenerator_gpu.so',
                'lib/x86_64/**',
                'lib/x86/**',
            ]
        }
    }

    buildTypes {
        release {
            // Use production signing if keys are available, otherwise fall back to debug.
            if (keyProperties['storeFile'] != null && file(keyProperties['storeFile']).exists()) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
