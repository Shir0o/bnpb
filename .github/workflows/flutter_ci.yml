name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # You can specify a version if needed, e.g., flutter-version: '3.19.0'
          # checks pubspec.yaml for sdk version

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      # Release build catches R8/proguard regressions from native deps
      # (e.g. flutter_gemma's MediaPipe libs) that `flutter test` doesn't.
      - run: flutter build apk --release --target-platform=android-arm64
