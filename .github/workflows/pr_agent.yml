name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    name: PR Agent review
    runs-on: ubuntu-latest
    # Skip bot-authored events to avoid loops
    if: ${{ github.event.sender.type != 'Bot' }}
    timeout-minutes: 10
    steps:
      - name: PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: "gemini/gemini-2.5-pro"
          CONFIG__FALLBACK_MODELS: '["gemini/gemini-2.5-flash"]'
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "false"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "false"
