name: bnpb
description: "A Flutter project for managing contacts and visualizing data."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  graphview: ^1.2.0
  intl: ^0.20.1
  path_provider: ^2.0.13
  share_plus: ^10.1.3
  file_picker: ^8.1.7
  sqflite: ^2.2.0
  path: ^1.8.3
  google_fonts: ^6.0.0
  timeline_tile: ^2.0.0
  fl_chart: ^0.68.0
  google_sign_in: ^6.1.5
  googleapis: ^13.0.0
  http: ^1.2.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_timezone: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
