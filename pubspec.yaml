name: bnpb
description: "A Flutter project for managing contacts and visualizing data."

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  graphview: ^1.2.0
  intl: ^0.20.1
  path_provider: ^2.0.13
  share_plus: ^12.0.1
  file_picker: ^10.3.8
  sqlite3: ^2.1.0
  sqflite_sqlcipher: ^3.4.0
  sqflite_common_ffi: ^2.3.0
  sqlcipher_flutter_libs: ^0.6.2
  path: ^1.8.3
  google_fonts: ^8.1.0
  timeline_tile: ^2.0.0
  fl_chart: ^1.1.1
  http: ^1.2.1
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.0
  csv: ^6.0.0
  pdf: ^3.10.7
  archive: ^4.0.7
  encrypt: ^5.0.1
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  crypto: ^3.0.7
  meta: ^1.17.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0

  path_provider_platform_interface: any
  plugin_platform_interface: any
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
